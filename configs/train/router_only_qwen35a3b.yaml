model:
  model_name_or_path: Qwen/Qwen3.5-35B-A3B
  tokenizer_name_or_path: null
  trust_remote_code: true
  torch_dtype: bfloat16
  attn_implementation: flash_attention_2
  gradient_checkpointing: true
  use_cache: false
  max_length: 256
  router_name_patterns:
    - shared_expert_gate
    - mlp.gate.weight

data:
  train_jsonl: data/processed/train_pairs.jsonl
  eval_jsonl: data/processed/eval_pairs.jsonl
  num_workers: 4

training:
  output_dir: outputs/qwen35a3b_router_only
  seed: 42
  epochs: 1
  train_batch_size: 2
  eval_batch_size: 4
  gradient_accumulation_steps: 64
  learning_rate: 2.0e-4
  weight_decay: 0.0
  warmup_ratio: 0.03
  max_grad_norm: 1.0
  log_every: 5
  save_every_steps: 200
  eval_every_steps: 0
  max_steps: 1000

contrastive:
  temperature_init: 0.07
  logit_scale_max: 100.0
  cross_device_negatives: true
  feature_queue_size: 4096

runtime:
  bf16: true
  fp16: false
  tf32: true
  distributed_backend: auto
  distributed_timeout_minutes: 60
